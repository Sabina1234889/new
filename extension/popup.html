<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voice Assistant</h1>
            <p class="subtitle">Click the mic and speak</p>
        </header>

        <div class="main-content">
            <button id="mic-btn" class="mic-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mic"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
            
            <div id="status" class="status">Ready</div>
            
            <div class="output-container">
                <p id="transcript" class="transcript">"Your speech will appear here..."</p>
            </div>
        </div>

        <div class="commands-hint">
            <p>Try: "Open Youtube", "Open Google", or "Search for cats"</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
